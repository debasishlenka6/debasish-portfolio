<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="cisco" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#049fd9"/>
      <stop offset="100%" style="stop-color:#00bceb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Firewall device shape (MX75) -->
  <rect x="230" y="140" width="340" height="100" rx="8" fill="#1a1a2e" stroke="url(#cisco)" stroke-width="2.5"/>
  <!-- Status LEDs -->
  <circle cx="260" cy="165" r="6" fill="#00ff00"/>
  <circle cx="280" cy="165" r="6" fill="#00ff00"/>
  <circle cx="300" cy="165" r="6" fill="#ffaa00"/>
  <!-- Ports -->
  <rect x="330" y="155" width="16" height="12" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="352" y="155" width="16" height="12" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="374" y="155" width="16" height="12" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="396" y="155" width="16" height="12" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="418" y="155" width="16" height="12" rx="2" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="400" y="200" text-anchor="middle" fill="url(#cisco)" font-size="18" font-family="Arial" font-weight="bold">Cisco Meraki MX75</text>
  <text x="400" y="220" text-anchor="middle" fill="#666" font-size="11" font-family="monospace">ENTERPRISE FIREWALL</text>
  <!-- Feature badges -->
  <rect x="80" y="280" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#049fd9" stroke-width="1.5"/>
  <text x="140" y="301" text-anchor="middle" fill="#049fd9" font-size="20">🔒</text>
  <text x="140" y="320" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">VPN Tunnels</text>

  <rect x="220" y="280" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#00ff88" stroke-width="1.5"/>
  <text x="280" y="301" text-anchor="middle" fill="#00ff88" font-size="20">🛡</text>
  <text x="280" y="320" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Content Filtering</text>

  <rect x="360" y="280" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#ff6600" stroke-width="1.5"/>
  <text x="420" y="301" text-anchor="middle" fill="#ff6600" font-size="20">🔥</text>
  <text x="420" y="320" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Firewall Rules</text>

  <rect x="500" y="280" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#aa00ff" stroke-width="1.5"/>
  <text x="560" y="301" text-anchor="middle" fill="#aa00ff" font-size="20">🌐</text>
  <text x="560" y="320" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial">Net Segmentation</text>

  <!-- Connecting lines -->
  <line x1="140" y1="280" x2="300" y2="240" stroke="#049fd9" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="280" y1="280" x2="360" y2="240" stroke="#00ff88" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="420" y1="280" x2="400" y2="240" stroke="#ff6600" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="560" y1="280" x2="470" y2="240" stroke="#aa00ff" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Internet and LAN indicators -->
  <text x="200" y="120" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">WAN / Internet</text>
  <line x1="200" y1="125" x2="310" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="120" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">LAN / VLAN</text>
  <line x1="600" y1="125" x2="495" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="400" y="375" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Arial, sans-serif" font-weight="bold">Cisco Meraki MX75 Firewall Management</text>
</svg>
