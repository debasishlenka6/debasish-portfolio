name: Build & Deploy Portfolio

on:
  push:
    branches: [main]

# Permissions needed for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # ── Job 1: Build Docker image & push to Docker Hub ──
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/debasish-portfolio:latest
          ${{ secrets.DOCKER_USERNAME }}/debasish-portfolio:${{ github.sha }}

  # ── Job 2: Deploy to GitHub Pages (free hosting) ────
  deploy-pages:
    name: 🌍 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docker
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Upload portfolio files
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4
