name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # ── Job 1: Test & Validate ───────────────────────
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      
    - name: Install HTMLHint
      run: npm install -g htmlhint

    - name: Validate HTML files
      run: |
        echo "Validating HTML files..."
        htmlhint index.html
        htmlhint projects/*.html
        echo "All HTML files valid!"

    - name: Lint Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        failure-threshold: error

    - name: Validate K8s manifests
      run: |
        echo "Validating YAML syntax..."
        python3 -c "
        import yaml, glob, sys
        files = glob.glob('k8s/*.yaml')
        errors = []
        for f in files:
            try:
                yaml.safe_load(open(f))
                print(f'OK: {f}')
            except Exception as e:
                errors.append(f'ERROR in {f}: {e}')
        if errors:
            print('\n'.join(errors))
            sys.exit(1)
        print('All K8s YAML files valid!')
        "

    - name: Test nginx config
      run: |
        docker run --rm \
          -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
          nginx:alpine nginx -t
        echo "Nginx config valid!"

  # ── Job 2: Build Docker image ────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/debasish-portfolio:latest
          ${{ secrets.DOCKER_USERNAME }}/debasish-portfolio:${{ github.sha }}

  # ── Job 3: Deploy to GitHub Pages ────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/configure-pages@v4
    - uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4

